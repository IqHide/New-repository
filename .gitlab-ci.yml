stages:
  - lint
  - typecheck
  - test
  - build

default:
  image: node:20-alpine
  before_script:
    - corepack enable
    - corepack prepare pnpm@latest --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store

lint:
  stage: lint
  script:
    - pnpm lint

typecheck:
  stage: typecheck
  script:
    - pnpm typecheck

test:
  stage: test
  script:
    - pnpm test -- --ci

build:
  stage: build
  script:
    - pnpm build
  artifacts:
    paths:
      - .next/
    expire_in: 1 hour
